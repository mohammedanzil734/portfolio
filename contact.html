        <li><a href="contact.html" class="active">contact</a></li>
      </ul>
    </div>
  </header>

  <main>

    <section>
      <div class="container contact-grid">

        <div>

          <p class="eyebrow">// contact</p>
          <h2 class="section-title">Let's Connect</h2>

          <div class="contact-info-item">
            <p class="label">Email</p>
            <p>
              <a href="mailto:anzil.soc@gmail.com">anzil.soc@gmail.com</a>
            </p>
          </div>

          <div class="contact-info-item">
            <p class="label">Phone</p>
            <p>+91 8921629489</p>
          </div>

          <div class="contact-info-item">
            <p class="label">Location</p>
            <p>Kochi, Kerala, India</p>
          </div>

          <div class="social-links">
            <a href="https://www.linkedin.com/in/mohammed-anzil-967990332" target="_blank" rel="noopener">
              LinkedIn
            </a>

            <a href="https://github.com/mohammedanzil734" target="_blank" rel="noopener">
              GitHub
            </a>
          </div>

        </div>

        <form id="enquiry-form" novalidate>

          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your Full Name"
            >
            <p class="error-message" id="name-error"></p>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
            >
            <p class="error-message" id="email-error"></p>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="Subject"
            >
            <p class="error-message" id="subject-error"></p>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Write your message..."
            ></textarea>
            <p class="error-message" id="message-error"></p>
          </div>

          <button type="submit" class="btn btn-solid">
            Send Message
          </button>

          <p class="form-status" id="form-status"></p>

        </form>

      </div>
    </section>

  </main>
